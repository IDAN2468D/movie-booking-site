name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js 18.x
      uses: actions/setup-node@v3
      with:
        node-version: 18.x
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run Unit Tests
      run: npx vitest run
      
    - name: Build Project
      run: npm run build
      env:
        # Provide dummy env vars to allow next build to pass if it relies on them statically
        NEXTAUTH_SECRET: 'ci-dummy-secret'
        GOOGLE_CLIENT_ID: 'ci-dummy'
        GOOGLE_CLIENT_SECRET: 'ci-dummy'
